version: "3.9"

services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: course_api
      MYSQL_USER: course
      MYSQL_PASSWORD: course
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 5s
      timeout: 3s
      retries: 12

  app:
    build: .
    environment:
      DB_URL: "course:course@tcp(mysql:3306)/course_api"
      PORT: "3000"
    ports:
      - "3000:3000"
    depends_on:
      mysql:
        condition: service_healthy
